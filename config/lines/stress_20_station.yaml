      - {mapping_id: WS05_EXT, plc_id: PLC_001, station_id: WS05, db_number: 116, usage: payload_ext, direction: read, mapping_type: payload, read_start: 0, read_size_bytes: 128, poll_interval_ms: 200}
    payload_template: stress_payload_v1
