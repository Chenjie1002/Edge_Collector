# Synthetic, non-production configuration for loader/validator and future performance tests.
# The 5-second stress timing below is simulation-only and is not an OEE/production default.
schema_version: 1
config_version: "2026.06.20-stress20-v1"
line_id: LINE_STRESS_20
name: Twenty Station Synthetic Configuration Stress Line
timezone: Asia/Shanghai

scenario: {name: synthetic-20-station-stress, scenario_type: stress, test_run_id: stress20-contract-baseline, random_seed: 20260622, global_nok_rate: 0.01, production: false}
hardware_envelope: {target_hardware_class: raspberry_pi_5, intended_load_class: stress}

plcs:
  - {plc_id: PLC_001, runtime_db: 104, max_stations: 10, max_db_mappings_per_station: 4}
  - {plc_id: PLC_002, runtime_db: 204, max_stations: 10, max_db_mappings_per_station: 4}

payload_templates:
  stress_payload_v1:
    version: 1
    template_type: measurement_payload
    compatible_station_types: [assembly, screwdriving, press, vision, test, manual_confirm, label, pack, generic]
    approximate_size_bytes: 64
    fields:
      - {name: status_word, field_type: uint16, offset: 0, length: 2, required: true, direction: read}
      - {name: synthetic_value, field_type: float32, offset: 4, length: 4, required: false, direction: read}

nok_templates:
  stress_nok_v1:
    version: 1
    template_type: quality
    compatible_station_types: [assembly, screwdriving, press, vision, test, manual_confirm, label, pack, generic]
    codes:
      - {code: 19001, name: SYNTHETIC_PROCESS_NOK, category: quality, severity: warning, mode: random_simulated_nok, allow_random: true, allow_force: false}

cycle_profiles:
  synthetic_stress:
    mode: stress
    ideal_cycle_time_s: 20.0
    simulation:
      base_cycle_s: 20.0
      jitter_s: 0.5
      cycle_scale: 4.0
      stress_cycle_time_s: 5.0

stations:
  - {station_id: WS01, station_order: 10, station_type: assembly, station_enabled: true, plc_id: PLC_001, db_mappings: [{mapping_id: WS01_MAIN, plc_id: PLC_001, station_id: WS01, db_number: 101, usage: event, direction: read_write, mapping_type: event, read_start: 0, read_size_bytes: 64, poll_interval_ms: 100}], payload_template: stress_payload_v1, nok_template: stress_nok_v1, cycle_profile: synthetic_stress, cycle_time_s: 20.0}
  - {station_id: WS02, station_order: 20, station_type: screwdriving, station_enabled: true, plc_id: PLC_001, db_mappings: [{mapping_id: WS02_MAIN, plc_id: PLC_001, station_id: WS02, db_number: 102, usage: event, direction: read_write, mapping_type: event, read_start: 0, read_size_bytes: 64, poll_interval_ms: 100}], payload_template: stress_payload_v1, nok_template: stress_nok_v1, cycle_profile: synthetic_stress, cycle_time_s: 20.0}
  - {station_id: WS03, station_order: 30, station_type: press, station_enabled: true, plc_id: PLC_001, db_mappings: [{mapping_id: WS03_MAIN, plc_id: PLC_001, station_id: WS03, db_number: 103, usage: event, direction: read_write, mapping_type: event, read_start: 0, read_size_bytes: 64, poll_interval_ms: 100}], payload_template: stress_payload_v1, nok_template: stress_nok_v1, cycle_profile: synthetic_stress, cycle_time_s: 20.0}
