schema_version: 1
config_version: "2026.06.20-demo10-v1"
line_id: LINE_DEMO_10
name: Ten Station Flexible Demo Line
timezone: Asia/Shanghai

scenario: {name: medium-flexible-demo, scenario_type: demo, test_run_id: demo10-default, random_seed: 20260621, global_nok_rate: 0.01, production: true}
hardware_envelope: {target_hardware_class: raspberry_pi_5, intended_load_class: medium}

plcs:
  - {plc_id: PLC_001, runtime_db: 104, max_stations: 10, max_db_mappings_per_station: 4}

payload_templates:
  flexible_payload_v1:
    version: 1
    template_type: measurement_payload
    compatible_station_types: [assembly, screwdriving, press, vision, eol_test, leak_test, label, manual_confirm, pack]
    approximate_size_bytes: 48
    fields:
      - {name: status_word, field_type: uint16, offset: 0, length: 2, required: true, direction: read}
      - {name: process_value, field_type: float32, offset: 4, length: 4, required: false, direction: read}
  generic_status_v1:
    version: 1
    template_type: status
    compatible_station_types: [generic]
    approximate_size_bytes: 16
    fields: [{name: status_word, field_type: uint16, offset: 0, length: 2, required: true, direction: read}]

nok_templates:
  flexible_nok_v1:
    version: 1
    template_type: quality
    compatible_station_types: [assembly, screwdriving, press, vision, eol_test, leak_test, label, manual_confirm, pack, generic]
    codes:
      - {code: 11001, name: PROCESS_NOK, category: quality, severity: error, mode: random_simulated_nok, allow_random: true, allow_force: false}

cycle_profiles:
  normal_medium:
    mode: demo
    ideal_cycle_time_s: 20.0
    simulation: {base_cycle_s: 20.0, jitter_s: 1.0, cycle_scale: 1.0, stress_cycle_time_s: null}

stations:
  - {station_id: WS01, station_order: 10, station_type: assembly, station_enabled: true, plc_id: PLC_001, db_mappings: [{mapping_id: WS01_MAIN, plc_id: PLC_001, station_id: WS01, db_number: 101, usage: event, direction: read_write, mapping_type: event, read_start: 0, read_size_bytes: 64, poll_interval_ms: 500}], payload_template: flexible_payload_v1, nok_template: flexible_nok_v1, cycle_profile: normal_medium, cycle_time_s: 20.0, nok_rate: 0.01}
  - {station_id: WS02, station_order: 20, station_type: screwdriving, station_enabled: true, plc_id: PLC_001, db_mappings: [{mapping_id: WS02_MAIN, plc_id: PLC_001, station_id: WS02, db_number: 102, usage: event, direction: read_write, mapping_type: event, read_start: 0, read_size_bytes: 64, poll_interval_ms: 500}], payload_template: flexible_payload_v1, nok_template: flexible_nok_v1, cycle_profile: normal_medium, cycle_time_s: 20.0}
  - {station_id: WS03, station_order: 30, station_type: press, station_enabled: true, plc_id: PLC_001, db_mappings: [{mapping_id: WS03_MAIN, plc_id: PLC_001, station_id: WS03, db_number: 103, usage: event, direction: read_write, mapping_type: event, read_start: 0, read_size_bytes: 64, poll_interval_ms: 500}], payload_template: flexible_payload_v1, nok_template: flexible_nok_v1, cycle_profile: normal_medium, cycle_time_s: 20.0}
  - {station_id: WS04, station_order: 40, station_type: vision, station_enabled: true, plc_id: PLC_001, db_mappings: [{mapping_id: WS04_MAIN, plc_id: PLC_001, station_id: WS04, db_number: 105, usage: event, direction: read_write, mapping_type: event, read_start: 0, read_size_bytes: 64, poll_interval_ms: 500}], payload_template: flexible_payload_v1, nok_template: flexible_nok_v1, cycle_profile: normal_medium, cycle_time_s: 20.0}
  - {station_id: WS05, station_order: 50, station_type: eol_test, station_enabled: true, plc_id: PLC_001, db_mappings: [{mapping_id: WS05_MAIN, plc_id: PLC_001, station_id: WS05, db_number: 106, usage: event, direction: read_write, mapping_type: event, read_start: 0, read_size_bytes: 64, poll_interval_ms: 500}], payload_template: flexible_payload_v1, nok_template: flexible_nok_v1, cycle_profile: normal_medium, cycle_time_s: 20.0}
  - {station_id: WS06, station_order: 60, station_type: leak_test, station_enabled: true, plc_id: PLC_001, db_mappings: [{mapping_id: WS06_MAIN, plc_id: PLC_001, station_id: WS06, db_number: 107, usage: event, direction: read_write, mapping_type: event, read_start: 0, read_size_bytes: 64, poll_interval_ms: 500}], payload_template: flexible_payload_v1, nok_template: flexible_nok_v1, cycle_profile: normal_medium, cycle_time_s: 20.0}
  - {station_id: WS07, station_order: 70, station_type: label, station_enabled: true, plc_id: PLC_001, db_mappings: [{mapping_id: WS07_MAIN, plc_id: PLC_001, station_id: WS07, db_number: 108, usage: event, direction: read_write, mapping_type: event, read_start: 0, read_size_bytes: 64, poll_interval_ms: 500}], payload_template: flexible_payload_v1, nok_template: flexible_nok_v1, cycle_profile: normal_medium, cycle_time_s: 20.0}
  - {station_id: WS08, station_order: 80, station_type: manual_confirm, station_enabled: true, plc_id: PLC_001, db_mappings: [{mapping_id: WS08_MAIN, plc_id: PLC_001, station_id: WS08, db_number: 109, usage: event, direction: read_write, mapping_type: event, read_start: 0, read_size_bytes: 64, poll_interval_ms: 500}], payload_template: flexible_payload_v1, nok_template: flexible_nok_v1, cycle_profile: normal_medium, cycle_time_s: 20.0}
  - {station_id: WS09, station_order: 90, station_type: pack, station_enabled: true, plc_id: PLC_001, db_mappings: [{mapping_id: WS09_MAIN, plc_id: PLC_001, station_id: WS09, db_number: 110, usage: event, direction: read_write, mapping_type: event, read_start: 0, read_size_bytes: 64, poll_interval_ms: 500}], payload_template: flexible_payload_v1, nok_template: flexible_nok_v1, cycle_profile: normal_medium, cycle_time_s: 20.0}
  - {station_id: WS10, station_order: 100, station_type: generic, station_enabled: true, plc_id: PLC_001, db_mappings: [{mapping_id: WS10_MAIN, plc_id: PLC_001, station_id: WS10, db_number: 111, usage: status, direction: read, mapping_type: status, read_start: 0, read_size_bytes: 32, poll_interval_ms: 1000}], payload_template: generic_status_v1, nok_template: flexible_nok_v1, cycle_profile: normal_medium, cycle_time_s: 20.0}

buffers:
  - {buffer_id: BUF_WS02_WS03, from_station_id: WS02, to_station_id: WS03, buffer_position: 25, buffer_type: fifo, capacity: 4}
  - {buffer_id: BUF_WS06_WS07, from_station_id: WS06, to_station_id: WS07, buffer_position: 65, buffer_type: pallet, capacity: 6}

route_graph:
  entry_station_id: WS01
  terminal_station_id: WS10
  edges:
    - {from_station_id: WS01, to_station_id: WS02}
    - {from_station_id: WS02, to_station_id: WS03}
    - {from_station_id: WS03, to_station_id: WS04}
    - {from_station_id: WS04, to_station_id: WS05}
    - {from_station_id: WS05, to_station_id: WS06}
    - {from_station_id: WS06, to_station_id: WS07}
    - {from_station_id: WS07, to_station_id: WS08}
    - {from_station_id: WS08, to_station_id: WS09}
    - {from_station_id: WS09, to_station_id: WS10}
